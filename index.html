<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCultureRadar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0E0B32;
    --navy80: rgba(14,11,50,0.8);
    --navy20: rgba(14,11,50,0.12);
    --navy10: rgba(14,11,50,0.06);
    --accent: #0E0B32;
    --bg: #F5F4F0;
    --card-bg: #FFFFFF;
    --text: #0E0B32;
    --text-muted: rgba(14,11,50,0.45);
    --text-light: rgba(14,11,50,0.28);
    --border: rgba(14,11,50,0.1);
    --sidebar-w: 180px;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    width: 52px;
    min-height: 100vh;
    background: var(--card-bg);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    overflow: hidden;
    transition: width 0.25s ease;
  }
  .sidebar.open { width: var(--sidebar-w); }

  .sidebar-top {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: 8px;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  #hamburger {
    background: none; border: none; cursor: pointer;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; padding: 0;
    color: var(--navy);
    transition: background 0.15s;
  }
  #hamburger:hover { background: var(--navy10); }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 14px;
    font-size: 13px; font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    border-left: 2px solid transparent;
    user-select: none;
    white-space: nowrap;
    overflow: hidden;
  }
  .sidebar:not(.open) .nav-item { padding: 8px; justify-content: center; gap: 0; }
  .sidebar:not(.open) .nav-sub { display: none; }
  .sidebar:not(.open) .sidebar-footer { align-items: center; }
  .nav-text { opacity: 1; transition: opacity 0.15s; }
  .sidebar:not(.open) .nav-text { display: none; }
  .nav-item:hover { color: var(--navy); background: var(--navy10); }
  .nav-item.active { color: var(--navy); font-weight: 500; border-left-color: var(--navy); background: var(--navy10); }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }
  .nav-item.active svg { opacity: 1; }
  .nav-sub { padding-left: 16px; border-left: 0.5px solid var(--border); margin: 2px 18px 4px 30px; }
  .nav-sub .nav-item { padding: 5px 8px; font-size: 12px; border-left: none; }
  .nav-sub .nav-item.active { font-weight: 500; color: var(--navy); }
  .sidebar-footer {
    padding: 12px 18px 20px;
    border-top: 0.5px solid var(--border);
    display: flex; flex-direction: column; gap: 2px;
  }

  /* Main */
  .main {
    margin-left: 52px;
    transition: margin-left 0.25s ease;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  #topbarTitle { display: flex; align-items: center; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .search-wrap {
    display: flex; align-items: center;
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    gap: 7px;
    min-width: 200px;
  }
  .search-wrap input {
    border: none; background: none; outline: none;
    font-size: 13px; color: var(--text);
    font-family: 'DM Sans', sans-serif;
    width: 100%;
  }
  .search-wrap input::placeholder { color: var(--text-light); }
  .search-wrap svg { width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0; }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    background: var(--card-bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--navy10); }
  .icon-btn svg { width: 15px; height: 15px; opacity: 0.55; }

  /* Content */
  .content { padding: 28px 28px 60px; }
  .section { margin-bottom: 36px; }
  .section-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px;
  }
  .section-arrow {
    margin-left: auto;
    background: transparent;
    border: 1.5px solid var(--navy);
    cursor: pointer;
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
    align-self: center;
  }
  .section-arrow:hover { opacity: 0.6; }
  .section-arrow svg { width: 13px; height: 13px; stroke: var(--navy); }
  .section-header svg { width: 16px; height: 16px; color: var(--navy); }
  .section-header h2 { font-size: 13px; font-weight: 500; letter-spacing: 0.06em; color: var(--navy); }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(14,11,50,0.08); }
  .card-thumb {
    width: 100%; aspect-ratio: 4/3;
    background:
      repeating-linear-gradient(45deg, rgba(14,11,50,0.05) 0px, rgba(14,11,50,0.05) 1px, transparent 1px, transparent 10px),
      #EBEBEB;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    color: var(--text-light);
    position: relative;
    border-bottom: 0.5px solid var(--border);
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .card-body { padding: 12px 14px 14px; display: flex; flex-direction: column; flex: 1; position: relative; }
  .card-title { font-size: 15px; font-weight: 500; color: var(--navy); margin-bottom: 6px; line-height: 1.35; }
  .card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; flex: 1; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; align-items: center; justify-content: flex-end; padding-top: 8px; }
  .card-bm {
    background: none; border: none; cursor: pointer; padding: 2px;
    color: var(--text-light); display: flex; align-items: center; transition: color 0.15s;
  }
  .card-bm svg { width: 15px; height: 15px; }
  .card-bm:hover { color: var(--navy); }
  .card-bm.active { color: var(--navy); }
  .card-arrow {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: transparent;
    border: 1.5px solid var(--navy);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
    cursor: pointer;
    margin-left: auto;
  }
  .card:hover .card-arrow { opacity: 0.6; }
  .card-arrow svg { width: 13px; height: 13px; stroke: var(--navy); }

  .card-arrow {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--navy10);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .card:hover .card-arrow { background: var(--navy); }
  .card:hover .card-arrow svg { stroke: white; }
  .card-arrow svg { width: 11px; height: 11px; stroke: var(--navy); transition: stroke 0.15s; }

  /* Journal view */
  .journal-list { display: flex; flex-direction: column; gap: 10px; }
  .journal-item {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .journal-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--navy10);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    color: var(--navy);
  }
  .journal-info { flex: 1; }
  .journal-title { font-size: 14px; font-weight: 500; color: var(--navy); margin-bottom: 3px; }
  .journal-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .journal-note { font-size: 12px; color: var(--text); line-height: 1.6; font-style: italic; }
  .journal-cat { font-size: 10px; padding: 2px 7px; border-radius: 999px; border: 0.5px solid var(--border); color: var(--text-muted); background: var(--bg); white-space: nowrap; }
  .add-journal-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px;
    border: 0.5px dashed var(--border);
    border-radius: var(--radius);
    font-size: 13px; color: var(--text-muted);
    cursor: pointer;
    background: transparent;
    transition: background 0.15s, color 0.15s;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
  }
  .add-journal-btn:hover { background: var(--card-bg); color: var(--navy); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(14,11,50,0.35);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 24px;
    width: 440px; max-width: 94vw;
    border: 0.5px solid var(--border);
  }
  .detail-modal .modal { padding: 0; }
  .modal h3 { font-size: 16px; font-weight: 500; color: var(--navy); margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; letter-spacing: 0.05em; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 9px 12px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px; color: var(--navy);
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--navy); }
  .form-group textarea { resize: vertical; min-height: 72px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .btn {
    padding: 8px 18px; border-radius: 8px; font-size: 13px;
    font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 400;
    transition: all 0.15s;
  }
  .btn-ghost { background: transparent; border: 0.5px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { background: var(--navy10); color: var(--navy); }
  .btn-primary { background: var(--navy); border: none; color: white; }
  .btn-primary:hover { opacity: 0.85; }

  /* Card detail modal */
  .detail-modal .modal {
    width: 480px;
    padding: 0;
    overflow: hidden;
    border-radius: 16px;
  }
  .detail-thumb {
    width: 100%; aspect-ratio: 16/9;
    background:
      repeating-linear-gradient(45deg, rgba(14,11,50,0.05) 0px, rgba(14,11,50,0.05) 1px, transparent 1px, transparent 10px),
      #EBEBEB;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; color: var(--text-light);
    position: relative;
  }

  .detail-body { padding: 16px 20px 20px; }
  .detail-title { font-size: 18px; font-weight: 500; color: var(--navy); margin-bottom: 6px; }
  .detail-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 0; }
  .status-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .status-opt {
    padding: 6px 14px; border-radius: 999px; font-size: 12px;
    border: 0.5px solid var(--border); cursor: pointer;
    transition: all 0.15s; color: var(--text-muted); background: var(--bg);
  }
  .status-opt:hover { border-color: var(--navy); color: var(--navy); }
  .status-opt.active { background: var(--navy); color: white; border-color: var(--navy); }

  /* Filter dropdown */
  .filter-menu {
    display: none; position: absolute; top: 48px; right: 0;
    background: var(--card-bg); border: 0.5px solid var(--border);
    border-radius: 10px; padding: 8px;
    min-width: 160px; z-index: 300;
    box-shadow: 0 8px 24px rgba(14,11,50,0.1);
  }
  .filter-menu.open { display: block; }
  .filter-opt {
    padding: 7px 12px; font-size: 12px; color: var(--text-muted);
    cursor: pointer; border-radius: 6px; transition: background 0.1s;
  }
  .filter-opt:hover { background: var(--navy10); color: var(--navy); }
  .filter-opt.active { color: var(--navy); font-weight: 500; }

  .filter-wrap { position: relative; }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .sidebar {
      display: none;
    }
    .main {
      margin-left: 0 !important;
      padding-bottom: 72px;
    }
    .topbar {
      padding: 10px 14px;
    }
    .search-wrap {
      min-width: 0;
      flex: 1;
    }
    .content {
      padding: 16px 14px 60px;
    }
    .cards-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .card-title { font-size: 13px; }
    .card-desc { font-size: 11px; -webkit-line-clamp: 3; }
    .section { margin-bottom: 24px; }
    .modal {
      width: 100% !important;
      max-width: 100% !important;
      border-radius: 16px 16px 0 0 !important;
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      margin: 0 !important;
    }
    .modal-overlay {
      align-items: flex-end !important;
    }
    .detail-modal .modal {
      border-radius: 16px 16px 0 0 !important;
    }
    .journal-item { padding: 10px 12px; gap: 10px; }
    .journal-icon { width: 30px; height: 30px; font-size: 14px; }
    .topbar-title svg { height: 20px; }
    .filter-menu { right: 0; top: 44px; }

    /* Bottom tab bar - handled below */
  }
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: var(--card-bg);
    border-top: 0.5px solid var(--border);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px;
    padding-bottom: env(safe-area-inset-bottom);
  }
  @media (max-width: 768px) {
    .tab-bar { display: flex; }
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    flex: 1; cursor: pointer; padding: 6px 0;
    color: var(--text-muted);
    font-size: 10px; font-weight: 400;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-item.active { color: var(--navy); font-weight: 500; }
  .tab-item svg { width: 20px; height: 20px; }

</style>
</head>
<body>

<!-- Sidebar -->

        <span class="nav-text">ART</span>

  </nav>
  <div class="sidebar-footer">
    <div class="nav-item" onclick="navigate('journal')" data-page="journal">

      <span class="nav-text">JOURNAL</span>

      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="nav-text">SETTINGS</span>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">

<!-- Journal Add Modal -->
<div class="modal-overlay" id="journalModal">
  <div class="modal">
    <h3>記録を追加</h3>
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="jTitle" placeholder="作品名">
    </div>
    <div class="form-group">
      <label>誰の作品？</label>
      <input type="text" id="jCreator" placeholder="監督・アーティスト・著者など">
    </div>
    <div class="form-group">
      <label>どこで？</label>
      <input type="text" id="jWhere" placeholder="映画館・Spotify・書店など">
    </div>
    <div class="form-group" id="jCategoryGroup">
      <label>カテゴリ</label>
      <select id="jCategory">
        <option value="movie">映画</option>
        <option value="music">音楽</option>
        <option value="book">本</option>
        <option value="art">アート・展示</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="form-group">
      <label>日付</label>
      <input type="date" id="jDate">
    </div>
    <div class="form-group">
      <label>どう思った？</label>
      <textarea id="jNote" placeholder="感想や印象に残ったこと..."></textarea>
    </div>
    <div class="form-group">
      <label>写真（最大5枚）</label>
      <div id="jImgPreview" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;"></div>
      <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);cursor:pointer;border:0.5px dashed var(--border);border-radius:8px;padding:7px 12px;font-weight:400;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        写真を追加
        <input type="file" id="jImages" accept="image/*" multiple style="display:none;" onchange="previewImages(this)">
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('journalModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveJournal()">保存</button>
    </div>
  </div>
</div>

<!-- Journal Detail Modal -->
<div class="modal-overlay" id="journalDetailModal">
  <div class="modal" style="width:480px;max-width:94vw;padding:0;border-radius:16px;overflow:hidden;">
    <div id="jdImageArea" style="display:none;width:100%;background:#EBEBEB;position:relative;">
      <div id="jdSlider" style="display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;"></div>
      <div id="jdDots" style="position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:5px;"></div>
    </div>
    <div style="padding:18px 20px 8px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;">
        <div id="jdTitle" style="font-size:18px;font-weight:500;color:var(--navy);line-height:1.3;"></div>
        <span id="jdCat" style="font-size:11px;padding:3px 9px;border-radius:999px;border:0.5px solid var(--border);color:var(--text-muted);background:var(--bg);white-space:nowrap;flex-shrink:0;margin-top:3px;"></span>
      </div>
      <div id="jdCreator" style="font-size:12px;color:var(--text-muted);margin-bottom:2px;"></div>
      <div id="jdWhere" style="font-size:12px;color:var(--text-muted);margin-bottom:10px;"></div>
      <div id="jdDate" style="font-size:12px;color:var(--text-muted);margin-bottom:12px;"></div>
      <div id="jdNote" style="font-size:13px;color:var(--text);line-height:1.7;margin-bottom:18px;min-height:20px;"></div>
    </div>
    <div style="padding:0 20px 18px;display:flex;justify-content:space-between;align-items:center;">
      <button class="btn btn-ghost" style="padding:6px 8px;" onclick="closeModal('journalDetailModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-ghost" style="padding:6px 10px;font-size:12px;" onclick="editJournal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;margin-right:4px;vertical-align:middle;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>編集
        </button>
        <button class="btn btn-ghost" style="padding:6px 10px;color:var(--text-muted);font-size:12px;" onclick="deleteJournal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;margin-right:4px;vertical-align:middle;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>削除
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Card Detail Modal -->
<div class="modal-overlay detail-modal" id="detailModal">
  <div class="modal">
    <div class="detail-thumb" id="detailThumb"></div>
    <div class="detail-body">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-sub" id="detailSub"></div>
    </div>
    <div class="modal-footer" style="justify-content:space-between; padding: 0 20px 20px; margin-top:0;">
      <button class="btn btn-ghost" style="padding:6px 8px;" onclick="closeModal('detailModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn btn-ghost" id="detailBmBtn" style="padding:6px 8px;" onclick="toggleBookmarkFromDetail()" title="ブックマーク">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><path d="M17 3a2 2 0 0 1 2 2v15a1 1 0 0 1-1.496.868l-4.512-2.578a2 2 0 0 0-1.984 0l-4.512 2.578A1 1 0 0 1 5 20V5a2 2 0 0 1 2-2z"/></svg>
        </button>
        <button class="btn btn-ghost" style="padding:6px 8px;" onclick="addToJournalFromDetail()" title="記録する">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><path d="M13.4 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7.4"/><path d="M2 6h4"/><path d="M2 10h4"/><path d="M2 14h4"/><path d="M2 18h4"/><path d="M21.378 5.626a1 1 0 1 0-3.004-3.004l-5.01 5.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const ICONS = { movie:'🎬', music:'🎵', book:'📚', art:'🖼', other:'✨' };
const CAT_LABELS = { movie:'MOVIE', music:'MUSIC', book:'BOOK', art:'ART' };

const SAMPLE_DATA = {
  movie: [
    { id:'m1', title:'Sinners', desc:'Ryan Coogler監督による最新作。1930年代のデルタを舞台にしたホラードラマ。', status:'want' },
    { id:'m2', title:'Mickey 17', desc:'ポン・ジュノ監督×Robert Pattinson。SF宇宙コロニー開拓の物語。', status:'none' },
    { id:'m3', title:'Thunderbolts*', desc:'Marvel新作。アウトキャストのヒーローたちが集結。', status:'done' },
    { id:'m4', title:'The Alto Knights', desc:'Robert De Niroがニューヨークマフィアの首領を二役で演じる。', status:'none' },
    { id:'m5', title:'Novocaine', desc:'痛みを感じない男が巻き込まれるアクションスリラー。', status:'none' },
    { id:'m6', title:'Black Bag', desc:'Steven Soderbergh監督。スパイ夫婦の心理戦。', status:'want' },
  ],

    { id:'mu1', title:'Manning Fireworks', desc:'MJ Lenderman。インディーロックの期待作。繊細な音の重なりが心地よい。', status:'done' },
    { id:'mu2', title:'Bright Future', desc:'Adrianne Lenker（Big Thief）のソロ最新作。ギターと声のみの静謐な世界。', status:'want' },
    { id:'mu3', title:'Short n\' Sweet', desc:'Sabrina Carpenter。キャッチーなポップチューンが詰まった話題作。', status:'none' },
    { id:'mu4', title:'GNX', desc:'Kendrick Lamar。2024年のアルバム。ウェストコーストの空気感。', status:'none' },
    { id:'mu5', title:'Imaginal Disk', desc:'Magdalena Bay。シンセポップの新境地を切り開く意欲作。', status:'want' },
    { id:'mu6', title:'Lives of the Saints', desc:'Vampire Weekend。5年ぶりの待望の新作。', status:'none' },
  ],
  book: [
    { id:'b1', title:'ある一生', desc:'ロベルト・ゼーターラー。オーストリアの山岳地帯を生きた男の物語。', status:'done' },
    { id:'b2', title:'存在の耐えられない軽さ', desc:'ミラン・クンデラ。プラハの春を背景にした愛と自由の哲学小説。', status:'want' },
    { id:'b3', title:'夜と霧', desc:'V・E・フランクル。強制収容所からの生還と実存的意味の探求。', status:'none' },
    { id:'b4', title:'パラサイト', desc:'ポン・ジュノ監督によるノベライズ版。映画とは違う深みを持つ。', status:'none' },
    { id:'b5', title:'カラマーゾフの兄弟', desc:'ドストエフスキー。信仰・自由・道徳を問う不朽の大作。', status:'none' },
    { id:'b6', title:'百年の孤独', desc:'ガルシア＝マルケス。マジックリアリズムの金字塔。', status:'want' },
  ],
  art: [
    { id:'a1', title:'村上隆 もののけ 京都', desc:'京都市京セラ美術館。圧倒的なスケールの新作群。2024年〜。', status:'done' },
    { id:'a2', title:'マティス展 光の旅', desc:'東京都美術館。フォーヴィズムの巨匠、後期作品を中心に。', status:'want' },
    { id:'a3', title:'塩田千春 魂がふるえる', desc:'森美術館。赤い糸で埋め尽くされた空間インスタレーション。', status:'none' },
    { id:'a4', title:'Chim↑Pom from Smappa!Group', desc:'森美術館。社会問題に切り込む現代アートグループの大規模個展。', status:'none' },
    { id:'a5', title:'ルーヴル美術館展', desc:'国立新美術館。愛をテーマにした西洋絵画の名品が集結。', status:'want' },
    { id:'a6', title:'デイヴィッド・ホックニー展', desc:'東京都現代美術館。色彩の魔術師による大規模回顧展。', status:'none' },
  ],
};

let journalData = JSON.parse(localStorage.getItem('mcr_journal') || '[]');
let cardStatuses = JSON.parse(localStorage.getItem('mcr_statuses') || '{}');
let currentPage = 'home';
let currentFilter = 'all';
let currentCardId = null;
let currentCat = null;
let currentJournalIdx = null;
let searchQuery = '';

function save() {
  localStorage.setItem('mcr_journal', JSON.stringify(journalData));
  localStorage.setItem('mcr_statuses', JSON.stringify(cardStatuses));
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`[data-page="${page}"]`).forEach(el => el.classList.add('active'));
  if (['movie','music','book','art'].includes(page)) {
    document.querySelector('[data-page="home"]').classList.add('active');
  }
  const tabPage = ['movie','music','book','art'].includes(page) ? 'home' : page;
  document.querySelectorAll('.tab-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tabPage);
  });
  render();
}

function render() {
  const c = document.getElementById('mainContent');
  if (currentPage === 'journal') { renderJournal(c); return; }
  if (currentPage === 'bookmark') { renderBookmark(c); return; }
  if (currentPage === 'settings') { renderSettings(c); return; }
  const cats = currentPage === 'home' ? ['movie','music','book','art'] : [currentPage];
  c.innerHTML = cats.map(cat => renderSection(cat)).join('');
}

function getStatus(id) { return cardStatuses[id] || 'none'; }

function filterCard(id) {
  if (currentFilter === 'all') return true;
  return getStatus(id) === currentFilter;
}

function searchCard(item) {
  if (!searchQuery) return true;
  return item.title.toLowerCase().includes(searchQuery.toLowerCase()) || item.desc.toLowerCase().includes(searchQuery.toLowerCase());
}

function renderSection(cat) {
  const items = SAMPLE_DATA[cat].filter(i => filterCard(i.id) && searchCard(i));
  if (!items.length) return '';
  const catArrow = `<button class="section-arrow" onclick="navigate('${cat}')" title="${cat}一覧へ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>`;
  const svgs = {
    movie: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/></svg>',
    music: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></svg>',
    book: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/><path d="M8 11h8"/><path d="M8 7h6"/></svg>',
    art: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>',
  };
  return `
    <div class="section">
      <div class="section-header">${svgs[cat]}<h2>${CAT_LABELS[cat]}</h2>${currentPage === 'home' ? catArrow : ''}</div>
      <div class="cards-grid">${items.map(i => renderCard(i, cat)).join('')}</div>
    </div>`;
}

function renderCard(item, cat) {
  const isBookmarked = getStatus(item.id) === 'want';
  return `
    <div class="card">
      <div class="card-thumb">${ICONS[cat]}</div>
      <div class="card-body">
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-footer">
          <div class="card-arrow" onclick="openDetail('${item.id}','${cat}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </div>
        </div>
      </div>
    </div>`;
}

function renderJournal(c) {
  const html = `
    <div class="section">
      <div class="section-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.4 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7.4"/><path d="M2 6h4"/><path d="M2 10h4"/><path d="M2 14h4"/><path d="M2 18h4"/><path d="M21.378 5.626a1 1 0 1 0-3.004-3.004l-5.01 5.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/></svg>
        <h2>JOURNAL</h2>
      </div>
      <div class="journal-list">
        ${journalData.length === 0 ? '<div class="empty">まだ記録がありません</div>' : journalData.slice().reverse().map((j, idx) => `
          <div class="journal-item" onclick="openJournalDetail(${idx})" style="cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background='var(--navy10)'" onmouseout="this.style.background=''">
            <div class="journal-icon">${ICONS[j.category] || '✨'}</div>
            <div class="journal-info">
              <div class="journal-title">${j.title}</div>
              <div class="journal-meta">${j.creator ? j.creator + ' · ' : ''}${j.date}${j.where ? ' · ' + j.where : ''}</div>
              ${j.note ? `<div class="journal-note">${j.note}</div>` : ''}
            </div>
            <div class="journal-cat">${j.categoryLabel || ''}</div>
          </div>`).join('')}
        <button class="add-journal-btn" onclick="openModal('journalModal')">+ 記録を追加</button>
      </div>
    </div>`;
  c.innerHTML = html;
}

function renderSettings(c) {
  const apiKey = localStorage.getItem('mcr_gemini_key') || '';
  const lastFetch = localStorage.getItem('mcr_last_fetch') || 'なし';
  const keySet = apiKey ? '<div style="font-size:11px;color:#1A7A4A;margin-top:8px;">✓ APIキー設定済み</div>' : '';
  const settingsHtml = '<div class="section" style="max-width:540px;">'
    + '<div class="section-header" style="margin-bottom:24px;">'
    + '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>'
    + '<h2>SETTINGS</h2>'
    + '</div>'
    + '<div style="background:var(--card-bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;">'
    + '<div style="font-size:13px;font-weight:500;color:var(--navy);margin-bottom:4px;">Gemini API キー</div>'
    + '<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">Google AI Studio で取得したAPIキーを入力してください。ブラウザ内にのみ保存されます。</div>'
    + '<div style="display:flex;gap:8px;">'
    + '<input type="password" id="apiKeyInput" value="' + apiKey + '" placeholder="AIza..." style="flex:1;padding:9px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);outline:none;color:var(--navy);">'
    + '<button class="btn btn-primary" onclick="saveApiKey()">保存</button>'
    + '</div>'
    + keySet
    + '</div>'
    + '<div style="background:var(--card-bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;">'
    + '<div style="font-size:13px;font-weight:500;color:var(--navy);margin-bottom:4px;">新着情報の取得</div>'
    + '<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">最終取得：' + lastFetch + '</div>'
    + '<button class="btn btn-ghost" onclick="fetchNewContent(true)" style="font-size:13px;">今すぐ更新する</button>'
    + '</div>'
    + '<div style="background:var(--card-bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px 22px;">'
    + '<div style="font-size:13px;font-weight:500;color:var(--navy);margin-bottom:4px;">レコメンド</div>'
    + '<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">ジャーナルの記録をもとにGeminiがおすすめを提案します。</div>'
    + '<button class="btn btn-primary" onclick="fetchRecommend()">レコメンドを取得</button>'
    + '<div id="recommendResult" style="margin-top:14px;font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;"></div>'
    + '</div>'
    + '</div>';
  c.innerHTML = settingsHtml;
}
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('mcr_gemini_key', key);
  render();
}

function renderBookmark(c) {
  const bookmarked = [];
  Object.keys(SAMPLE_DATA).forEach(cat => {
    SAMPLE_DATA[cat].forEach(item => {
      if (getStatus(item.id) === 'want') bookmarked.push({item, cat});
    });
  });
  c.innerHTML = `
    <div class="section">
      <div class="section-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2 2 0 0 1 2 2v15a1 1 0 0 1-1.496.868l-4.512-2.578a2 2 0 0 0-1.984 0l-4.512 2.578A1 1 0 0 1 5 20V5a2 2 0 0 1 2-2z"/></svg>
        <h2>BOOKMARK</h2>
      </div>
      ${bookmarked.length === 0
        ? '<div class="empty">「気になる」に設定したコンテンツがここに表示されます</div>'
        : `<div class="cards-grid">${bookmarked.map(({item,cat}) => renderCard(item,cat)).join('')}</div>`}
    </div>`;
}

function openDetail(id, cat) {
  currentCardId = id;
  currentCat = cat;
  const item = SAMPLE_DATA[cat].find(i => i.id === id);
  document.getElementById('detailThumb').textContent = ICONS[cat];
  document.getElementById('detailTitle').textContent = item.title;
  document.getElementById('detailSub').textContent = item.desc;
  const isBookmarked = getStatus(id) === 'want';
  const btn = document.getElementById('detailBmBtn');
  btn.style.color = isBookmarked ? 'var(--navy)' : '';
  btn.style.fontWeight = isBookmarked ? '500' : '';
  openModal('detailModal');
}

function toggleBookmark(id) {
  cardStatuses[id] = getStatus(id) === 'want' ? 'none' : 'want';
  save();
  render();
}

function toggleBookmarkFromDetail() {
  if (!currentCardId) return;
  toggleBookmark(currentCardId);
  const isBookmarked = getStatus(currentCardId) === 'want';
  const btn = document.getElementById('detailBmBtn');
  btn.style.color = isBookmarked ? 'var(--navy)' : '';
  btn.style.fontWeight = isBookmarked ? '500' : '';
}

function addToJournalFromDetail() {
  const title = document.getElementById('detailTitle').textContent;
  closeModal('detailModal');
  document.getElementById('jTitle').value = title;
  openModal('journalModal', true);
}

function openModal(id, fromCard) {
  document.getElementById(id).classList.add('open');
  if (id === 'journalModal') {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('jDate').value = today;
    document.getElementById('jCategoryGroup').style.display = fromCard ? 'none' : '';
  }
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

function saveJournal() {
  const title = document.getElementById('jTitle').value.trim();
  if (!title) return;
  // If editing, remove old entry first
  if (window._editingIdx !== undefined && window._editingIdx !== null) {
    const reversed = journalData.slice().reverse();
    const oldEntry = reversed[window._editingIdx];
    journalData = journalData.filter(j => j !== oldEntry);
    window._editingIdx = null;
    document.querySelector('#journalModal h3').textContent = '記録を追加';
  }
  const dateVal = document.getElementById('jDate').value;
  const dateLabel = dateVal
    ? new Date(dateVal + 'T00:00:00').toLocaleDateString('ja-JP', {month:'short', day:'numeric'})
    : new Date().toLocaleDateString('ja-JP', {month:'short', day:'numeric'});
  const catEl = document.getElementById('jCategory');
  const catLabels = { movie:'映画', music:'音楽', book:'本', art:'アート・展示', other:'その他' };
  const catVal = catEl ? catEl.value : (currentCat || 'other');
  const entry = {
    id: Date.now(),
    title,
    creator: document.getElementById('jCreator').value.trim(),
    where: document.getElementById('jWhere').value.trim(),
    category: catVal,
    categoryLabel: catLabels[catVal] || '',
    note: document.getElementById('jNote').value.trim(),
    date: dateLabel,
    dateRaw: document.getElementById('jDate').value,
    images: window._pendingImages || [],
  };
  journalData.push(entry);
  save();
  window._pendingImages = [];
  document.getElementById('jTitle').value = '';
  document.getElementById('jCreator').value = '';
  document.getElementById('jWhere').value = '';
  document.getElementById('jNote').value = '';
  document.getElementById('jDate').value = '';
  document.getElementById('jImgPreview').innerHTML = '';
  window._editingIdx = null;
  document.querySelector('#journalModal h3').textContent = '記録を追加';
  closeModal('journalModal');
  if (currentPage === 'journal') render();
}

function toggleFilter() { document.getElementById('filterMenu').classList.toggle('open'); }
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-opt').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === ({all:'すべて', want:'気になる', done:'済み', none:'未設定'}[f]));
  });
  document.getElementById('filterMenu').classList.remove('open');
  render();
}
document.addEventListener('click', e => {
  if (!e.target.closest('.filter-wrap')) document.getElementById('filterMenu').classList.remove('open');
});

function sortCards() {
  Object.keys(SAMPLE_DATA).forEach(cat => {
    SAMPLE_DATA[cat].sort((a,b) => {
      const order = {want:0, done:1, none:2};
      return (order[getStatus(a.id)]||2) - (order[getStatus(b.id)]||2);
    });
  });
  render();
}

function handleSearch(v) { searchQuery = v; render(); }

// Load cached Gemini data if available
const cachedData = localStorage.getItem('mcr_cached_data');
if (cachedData) {
  try {
    const parsed = JSON.parse(cachedData);
    ['movie','music','book','art'].forEach(cat => {
      if (parsed[cat]) SAMPLE_DATA[cat] = parsed[cat];
    });
  } catch(e) {}
}


function previewImages(input) {
  const files = Array.from(input.files).slice(0, 5);
  window._pendingImages = [];
  const preview = document.getElementById('jImgPreview');
  preview.innerHTML = '';
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      window._pendingImages.push(e.target.result);
      const img = document.createElement('img');
      img.src = e.target.result;
      img.style.cssText = 'width:64px;height:64px;object-fit:cover;border-radius:6px;border:0.5px solid var(--border);';
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

function editJournal() {
  const reversed = journalData.slice().reverse();
  const j = reversed[currentJournalIdx];
  closeModal('journalDetailModal');
  // Populate form with existing data
  document.getElementById('jTitle').value = j.title || '';
  document.getElementById('jCreator').value = j.creator || '';
  document.getElementById('jWhere').value = j.where || '';
  document.getElementById('jNote').value = j.note || '';
  // Set date
  if (j.dateRaw) {
    document.getElementById('jDate').value = j.dateRaw;
  } else {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('jDate').value = today;
  }
  // Show category
  document.getElementById('jCategoryGroup').style.display = '';
  if (j.category) document.getElementById('jCategory').value = j.category;
  // Set pending images
  window._pendingImages = j.images ? [...j.images] : [];
  const preview = document.getElementById('jImgPreview');
  preview.innerHTML = '';
  (j.images || []).forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    img.style.cssText = 'width:64px;height:64px;object-fit:cover;border-radius:6px;border:0.5px solid var(--border);';
    preview.appendChild(img);
  });
  // Mark as editing
  window._editingIdx = currentJournalIdx;
  document.querySelector('#journalModal h3').textContent = '記録を編集';
  openModal('journalModal');
}

function deleteJournal() {
  if (!confirm('この記録を削除しますか？')) return;
  const reversed = journalData.slice().reverse();
  const entry = reversed[currentJournalIdx];
  journalData = journalData.filter(j => j !== entry);
  save();
  closeModal('journalDetailModal');
  if (currentPage === 'journal') render();
}

function openJournalDetail(idx) {
  currentJournalIdx = idx;
  const j = journalData.slice().reverse()[idx];
  document.getElementById('jdTitle').textContent = j.title;
  document.getElementById('jdDate').textContent = j.date;
  document.getElementById('jdCat').textContent = j.categoryLabel || '';
  document.getElementById('jdNote').textContent = j.note || '';
  const creatorEl = document.getElementById('jdCreator');
  const whereEl = document.getElementById('jdWhere');
  creatorEl.textContent = j.creator ? '👤 ' + j.creator : '';
  whereEl.textContent = j.where ? '📍 ' + j.where : '';
  const area = document.getElementById('jdImageArea');
  const slider = document.getElementById('jdSlider');
  const dots = document.getElementById('jdDots');
  if (j.images && j.images.length) {
    area.style.display = 'block';
    slider.innerHTML = j.images.map(src =>
      `<img src="${src}" style="width:100%;flex-shrink:0;scroll-snap-align:start;aspect-ratio:16/9;object-fit:cover;display:block;">`
    ).join('');
    dots.innerHTML = j.images.length > 1
      ? j.images.map((_, i) => `<div style="width:6px;height:6px;border-radius:50%;background:${i===0?'white':'rgba(255,255,255,0.5)'};" id="dot-${i}"></div>`).join('')
      : '';
    if (j.images.length > 1) {
      slider.onscroll = () => {
        const i = Math.round(slider.scrollLeft / slider.offsetWidth);
        dots.querySelectorAll('div').forEach((d,idx) => d.style.background = idx===i ? 'white' : 'rgba(255,255,255,0.5)');
      };
    }
  } else {
    area.style.display = 'none';
    slider.innerHTML = '';
    dots.innerHTML = '';
  }
  openModal('journalDetailModal');
}

async function callGemini(prompt) {
  const key = localStorage.getItem('mcr_gemini_key');
  if (!key) { alert('設定画面でGemini APIキーを入力してください。'); return null; }
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    if (data.error) { alert('APIエラー: ' + data.error.message); return null; }
    return data.candidates?.[0]?.content?.parts?.[0]?.text || null;
  } catch(e) {
    alert('通信エラーが発生しました。');
    return null;
  }
}

async function fetchNewContent(force = false) {
  const key = localStorage.getItem('mcr_gemini_key');
  if (!key) { navigate('settings'); alert('まずAPIキーを設定してください。'); return; }

  const now = new Date();
  const lastFetch = localStorage.getItem('mcr_last_fetch_ts');
  const daysSince = lastFetch ? (now - new Date(lastFetch)) / (1000*60*60*24) : 999;
  if (!force && daysSince < 6) return;

  const loadingEl = document.getElementById('mainContent');
  if (loadingEl) loadingEl.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:13px;">Geminiから最新情報を取得中...</div>';

  const today = now.toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric'});
  const prompt = `あなたは日本の文化情報アシスタントです。今日は${today}です。
以下のカテゴリごとに、最近リリース・公開・開催されている注目のコンテンツを各4件、JSON形式で返してください。
必ずJSON配列のみを返し、説明文や\`\`\`は不要です。

{
  "movie": [{"id":"m_1","title":"タイトル","desc":"100文字以内の説明"}],
  "music": [{"id":"mu_1","title":"タイトル","desc":"100文字以内の説明"}],
  "book": [{"id":"b_1","title":"タイトル","desc":"100文字以内の説明"}],
  "art": [{"id":"a_1","title":"タイトル（展示名）","desc":"100文字以内の説明（会場名を含む）"}]
}`;

  const result = await callGemini(prompt);
  if (!result) { render(); return; }

  try {
    const clean = result.replace(/```json|```/g, '').trim();
    const data = JSON.parse(clean);
    ['movie','music','book','art'].forEach(cat => {
      if (data[cat] && data[cat].length) {
        data[cat].forEach((item, i) => {
          item.id = item.id || `${cat}_${i}`;
          item.status = 'none';
        });
        SAMPLE_DATA[cat] = data[cat];
      }
    });
    localStorage.setItem('mcr_last_fetch_ts', now.toISOString());
    localStorage.setItem('mcr_last_fetch', now.toLocaleDateString('ja-JP', {month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'}));
    localStorage.setItem('mcr_cached_data', JSON.stringify(SAMPLE_DATA));
  } catch(e) {
    console.error('Parse error:', e, result);
  }
  render();
}

async function fetchRecommend() {
  if (journalData.length === 0) {
    const el = document.getElementById('recommendResult');
    if (el) el.textContent = 'ジャーナルに記録を追加してからお試しください。';
    return;
  }
  const resultEl = document.getElementById('recommendResult');
  if (!resultEl) return;
  resultEl.textContent = '取得中...';

  const journalSummary = journalData.slice(-10).map(j =>
    '・' + j.title + '（' + (j.categoryLabel || '') + '）' + (j.note ? '：' + j.note : '')
  ).join('\n');

  const prompt = '以下は私が最近体験したコンテンツの記録です：\n'
    + journalSummary
    + '\n\nこの記録をもとに、私が次に楽しめそうな映画・音楽・本・展示をそれぞれ1〜2件、理由とともに日本語で提案してください。200文字以内で簡潔にお願いします。';

  const result = await callGemini(prompt);
  if (result) resultEl.textContent = result;
}
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const main = document.querySelector('.main');
  const isOpen = sidebar.classList.toggle('open');
  main.style.marginLeft = isOpen ? 'var(--sidebar-w)' : '52px';
}

render();

// Auto-fetch on Fridays or if data is stale (>6 days)
const _now = new Date();
const _lastFetch = localStorage.getItem('mcr_last_fetch_ts');
const _daysSince = _lastFetch ? (_now - new Date(_lastFetch)) / (1000*60*60*24) : 999;
const _isFriday = _now.getDay() === 5;
if (localStorage.getItem('mcr_gemini_key') && (_isFriday || _daysSince > 6)) {
  setTimeout(() => fetchNewContent(), 1000);
}
</script>
